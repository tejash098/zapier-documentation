  <body>
    <!--
      Renders ./openapi.yaml with Redoc.

      Because the spec is fetched over HTTP, this page must be SERVED, not
      opened from the file system (file://) — browsers block the fetch otherwise.

      Local preview (any one of these):
        npx http-server . -p 8080      then open http://localhost:8080
        python -m http.server 8080     then open http://localhost:8080

      Deploy: upload index.html and openapi.yaml together to any static host
      (GitHub Pages, Netlify, Vercel, S3, etc.). No build step required.
    -->
    <redoc
      spec-url="./openapi.yaml"
      hide-download-button="false"
    ></redoc>
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  </body>
